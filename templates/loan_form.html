<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Loan Application</title>
</head>
<body>
    <h2>Apply for a New Loan</h2>
    <p>Logged in as: {{ session['name'] }} | <a href="/dashboard">Back to Dashboard</a></p>
    <hr>

    <form action="/loan/new" method="POST">
        <div>
            <label>Full Name:</label><br>
            <input type="text" name="applicant_name" required>
        </div><br>

        <div>
            <label>Annual Income:</label><br>
            <input type="number" name="income" step="0.01" required>
        </div><br>

        <div>
            <label>Employment Status:</label><br>
            <select name="employment_status" required>
                <option value="Employed">Employed</option>
                <option value="Self-Employed">Self-Employed</option>
                <option value="Unemployed">Unemployed</option>
            </select>
        </div><br>

        <div>
            <label>Loan Amount Requested:</label><br>
            <input type="number" name="loan_amount" required>
        </div><br>

        <div>
            <label>Loan Term (Months):</label><br>
            <input type="number" name="loan_term" required>
        </div><br>

        <div>
            <label>Credit Score:</label><br>
            <input type="number" name="credit_score" min="300" max="850" required>
        </div><br>

        <button type="submit">Submit Application</button>
    </form>
</body>
</html>
