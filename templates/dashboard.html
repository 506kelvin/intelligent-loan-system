<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Loan AI</title>
</head>
<body>
    <header>
        <h1>Loan AI Management System</h1>
        <nav>
            <a href="{{ url_for('dashboard') }}">Home</a> | 
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main>
        <h2>Welcome, {{ session.name }}!</h2>
        <p><strong>Your Role:</strong> {{ session.role }}</p>
        
        <hr>
        
        <h3>Available Actions</h3>
        <ul>
            {% if session.role == 'admin' %}
                <li>Manage Users</li>
                <li>System Logs</li>
            {% endif %}
            <li>View Loan Applications</li>
            <li>Submit New Application</li>
        </ul>
    </main>
</body>
</html>
